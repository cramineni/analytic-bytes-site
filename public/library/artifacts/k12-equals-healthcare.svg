<svg viewBox="0 0 1200 2000" xmlns="http://www.w3.org/2000/svg" role="img">
<title>K-12 = Healthcare: Different sectors. Same discipline.</title>
<desc>Translation table on white showing how K-12 data and analytics vocabulary maps to healthcare equivalents across eighteen paired concepts spanning outcomes, intervention workflow, infrastructure, regulation, accountability, and integrative philosophy, with a two-line navy and teal headline above and an Analytic Bytes signature beneath.</desc>
<rect width="1200" height="2000" fill="#FFFFFF"/>

<!-- Top eyebrow -->
<text x="600" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="6" fill="#0EA5E9" text-anchor="middle">K-12  =  HEALTHCARE</text>

