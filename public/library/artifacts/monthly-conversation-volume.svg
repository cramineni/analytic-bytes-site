<svg viewBox="0 0 820 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">Monthly conversation volume — the shape of eighteen months on the surface</title>
<desc id="desc">A bar chart of message volume across eighteen months from November 2024 to July 2026. A quiet warmup phase through the vending-machine and early GPT months, a steady climb as the GPT foundation gets built, a pronounced teal spike at April 2026 marking the twenty-three-day crisis thread of two hundred nine messages, and a sustained higher plateau across May, June, and July as multi-tool selection stabilizes. The chart makes the essay's timeline concrete: the spike is the crisis; the plateau is the practice.</desc>
<rect width="820" height="660" fill="#FFFFFF"/>

<text x="48" y="46" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">MONTHLY CONVERSATION VOLUME</text>
<text x="48" y="82" font-size="22" fill="#0F2A4A" font-weight="700">Eighteen months on the surface.</text>
<text x="48" y="110" font-size="22" fill="#0EA5E9" font-weight="700">The spike is the crisis.</text>

<!-- Plot area -->
<rect x="120" y="150" width="640" height="330" fill="#F1F5F8"/>

<!-- Axes -->
<line x1="120" y1="480" x2="760" y2="480" stroke="#0F2A4A" stroke-width="1.8"/>
<line x1="120" y1="150" x2="120" y2="480" stroke="#0F2A4A" stroke-width="1.8"/>

<!-- Y axis label -->
<text transform="translate(70,315) rotate(-90)" font-size="14" fill="#0F2A4A" font-weight="600" text-anchor="middle">MESSAGES / MONTH  ↑</text>

<!-- X axis label -->
<text x="440" y="545" font-size="14" fill="#0F2A4A" font-weight="600" text-anchor="middle">MONTH  →</text>

<!-- Y gridlines + labels -->
<line x1="120" y1="150" x2="760" y2="150" stroke="#6B7A8C" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>
<line x1="120" y1="232" x2="760" y2="232" stroke="#6B7A8C" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>
<line x1="120" y1="315" x2="760" y2="315" stroke="#6B7A8C" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>
<line x1="120" y1="397" x2="760" y2="397" stroke="#6B7A8C" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>
<text x="112" y="153" font-size="10" fill="#6B7A8C" text-anchor="end">400</text>
<text x="112" y="235" font-size="10" fill="#6B7A8C" text-anchor="end">300</text>
<text x="112" y="318" font-size="10" fill="#6B7A8C" text-anchor="end">200</text>
<text x="112" y="400" font-size="10" fill="#6B7A8C" text-anchor="end">100</text>
<text x="112" y="483" font-size="10" fill="#6B7A8C" text-anchor="end">0</text>

<!-- 18 bars — Nov '24 → Jul '26, ~33px per bar with gaps -->
<!-- Quiet warmup: Nov '24 – Aug '25 (10 bars) -->
<rect x="132" y="460" width="24" height="20" fill="#0F2A4A" opacity="0.55"/>
<rect x="164" y="455" width="24" height="25" fill="#0F2A4A" opacity="0.55"/>
<rect x="196" y="465" width="24" height="15" fill="#0F2A4A" opacity="0.55"/>
<rect x="228" y="445" width="24" height="35" fill="#0F2A4A" opacity="0.55"/>
<rect x="260" y="440" width="24" height="40" fill="#0F2A4A" opacity="0.55"/>
<rect x="292" y="425" width="24" height="55" fill="#0F2A4A" opacity="0.55"/>
<rect x="324" y="410" width="24" height="70" fill="#0F2A4A" opacity="0.6"/>
<rect x="356" y="395" width="24" height="85" fill="#0F2A4A" opacity="0.65"/>
<rect x="388" y="380" width="24" height="100" fill="#0F2A4A" opacity="0.7"/>
<rect x="420" y="360" width="24" height="120" fill="#0F2A4A" opacity="0.75"/>
<!-- Ramp: Sep '25 – Mar '26 (3 bars — post-Aug '25 GPT foundation) -->
<rect x="452" y="340" width="24" height="140" fill="#0F2A4A" opacity="0.8"/>
<rect x="484" y="325" width="24" height="155" fill="#0F2A4A" opacity="0.85"/>
<rect x="516" y="315" width="24" height="165" fill="#0F2A4A" opacity="0.85"/>
<!-- APRIL 2026: THE SPIKE — teal, 209-message crisis thread -->
<rect x="548" y="170" width="24" height="310" fill="#0EA5E9"/>
<!-- May, June, July '26 — sustained multi-tool era -->
<rect x="580" y="220" width="24" height="260" fill="#0F2A4A" opacity="0.9"/>
<rect x="612" y="205" width="24" height="275" fill="#0F2A4A" opacity="0.9"/>
<rect x="644" y="218" width="24" height="262" fill="#0F2A4A" opacity="0.9"/>

<!-- Spike callout -->
<line x1="560" y1="170" x2="560" y2="140" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="2 3"/>
<text x="640" y="145" font-size="11.5" fill="#0F2A4A" font-weight="700" text-anchor="middle">Apr 2026 · the 209-message thread</text>
<text x="640" y="160" font-size="10.5" fill="#6B7A8C" text-anchor="middle">23 days · Stage 3 crisis</text>

<!-- X axis month ticks -->
<text x="144" y="500" font-size="10" fill="#6B7A8C" text-anchor="middle">Nov ’24</text>
<text x="400" y="500" font-size="10" fill="#6B7A8C" text-anchor="middle">Aug ’25</text>
<text x="560" y="500" font-size="10" fill="#6B7A8C" text-anchor="middle">Apr ’26</text>
<text x="656" y="500" font-size="10" fill="#6B7A8C" text-anchor="middle">Jul ’26</text>

<!-- Region shading captions -->
<text x="278" y="170" font-size="11" fill="#6B7A8C" font-weight="600" text-anchor="middle">quiet warmup</text>
<text x="484" y="170" font-size="11" fill="#6B7A8C" font-weight="600" text-anchor="middle">foundation ramp</text>
<text x="612" y="440" font-size="11" fill="#FFFFFF" font-weight="600" text-anchor="middle">multi-tool</text>

<text x="48" y="600" font-size="14.5" fill="#0F2A4A" font-weight="600">Volume is not maturity. <tspan fill="#0EA5E9">The spike was one week; the plateau is the practice.</tspan></text>

<text x="48" y="640" font-size="13" letter-spacing="2" fill="#6B7A8C" font-weight="600">ANALYTIC BYTES</text>
<text x="200" y="640" font-size="13" fill="#0EA5E9">From fragmented to decision-ready.</text>
</svg>
