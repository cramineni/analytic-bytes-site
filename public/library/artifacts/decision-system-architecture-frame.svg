<svg viewBox="0 0 820 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">Decision-System Architecture — the four disciplines</title>
<desc id="desc">A radial diagram of Analytic Bytes' framework. A central node labeled Decision-System Architecture is surrounded by four cluster boxes — Measurement, Integration governance, AI systems, and Organizational design. Each cluster box names three load-bearing concepts inside the discipline. Short connector lines from the central node toward each cluster suggest composition without crossing through any text.</desc>

<rect width="820" height="820" fill="#FFFFFF"/>

<!-- HEADER -->
<text x="48" y="48" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">THE AB FRAMEWORK</text>
<text x="48" y="92" font-size="27" fill="#0E2A47" font-weight="700">Decision-system architecture.</text>
<text x="48" y="126" font-size="27" fill="#0EA5E9" font-weight="700">Four disciplines, one frame.</text>
<text x="48" y="158" font-size="13.5" fill="#6B7A8C" font-style="italic">Each piece in the Analytic Bytes Library sits in one of these four disciplines.</text>

<!-- SHORT CONNECTOR LINES — from edge of center node toward each cluster corner. -->
<!-- These radiate outward but stop in empty space so no text is crossed. -->
<line x1="358" y1="408" x2="330" y2="380" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
<line x1="462" y1="408" x2="490" y2="380" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
<line x1="358" y1="532" x2="330" y2="560" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
<line x1="462" y1="532" x2="490" y2="560" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>

<!-- CENTER NODE — Decision-System Architecture -->
<circle cx="410" cy="470" r="82" fill="#0E2A47"/>
<circle cx="410" cy="470" r="82" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.55"/>
<text x="410" y="452" text-anchor="middle" font-size="10" letter-spacing="2" fill="#0EA5E9" font-weight="600">THE FRAME</text>
<text x="410" y="478" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">Decision-System</text>
<text x="410" y="497" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">Architecture</text>

<!-- CLUSTER 1 — MEASUREMENT (top-left) -->
<rect x="40" y="220" width="290" height="160" fill="#F4F8FB" stroke="#E8F6FD" stroke-width="1"/>
<circle cx="60" cy="246" r="5" fill="#0EA5E9"/>
<text x="76" y="250" font-size="13" letter-spacing="2.5" fill="#0EA5E9" font-weight="700">MEASUREMENT</text>
<line x1="55" y1="266" x2="315" y2="266" stroke="#E8F6FD" stroke-width="1"/>
<text x="58" y="290" font-size="12.5" fill="#0E2A47" font-weight="600">Does this measure what we claim?</text>
<text x="58" y="316" font-size="11.5" fill="#6B7A8C">·  Construct validity</text>
<text x="58" y="336" font-size="11.5" fill="#6B7A8C">·  Reliability-filtered signals</text>
<text x="58" y="356" font-size="11.5" fill="#6B7A8C">·  Decision utility</text>

<!-- CLUSTER 2 — INTEGRATION GOVERNANCE (top-right) -->
<rect x="490" y="220" width="290" height="160" fill="#F4F8FB" stroke="#E8F6FD" stroke-width="1"/>
<circle cx="510" cy="246" r="5" fill="#0E2A47"/>
<text x="526" y="250" font-size="13" letter-spacing="2.5" fill="#0E2A47" font-weight="700">INTEGRATION GOVERNANCE</text>
<line x1="505" y1="266" x2="765" y2="266" stroke="#E8F6FD" stroke-width="1"/>
<text x="508" y="290" font-size="12.5" fill="#0E2A47" font-weight="600">Who specifies the seam, with what authority?</text>
<text x="508" y="316" font-size="11.5" fill="#6B7A8C">·  Seam contracts</text>
<text x="508" y="336" font-size="11.5" fill="#6B7A8C">·  Semantic keystone</text>
<text x="508" y="356" font-size="11.5" fill="#6B7A8C">·  Definitional reconciliation</text>

<!-- CLUSTER 3 — AI SYSTEMS (bottom-left) -->
<rect x="40" y="560" width="290" height="160" fill="#F4F8FB" stroke="#E8F6FD" stroke-width="1"/>
<circle cx="60" cy="586" r="4.5" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.75"/>
<text x="76" y="590" font-size="13" letter-spacing="2.5" fill="#0EA5E9" font-weight="700">AI SYSTEMS</text>
<line x1="55" y1="606" x2="315" y2="606" stroke="#E8F6FD" stroke-width="1"/>
<text x="58" y="630" font-size="12.5" fill="#0E2A47" font-weight="600">Where does AI sit, and who can stand behind its actions?</text>
<text x="58" y="656" font-size="11.5" fill="#6B7A8C">·  Grounding the AI layer</text>
<text x="58" y="676" font-size="11.5" fill="#6B7A8C">·  Actions, not answers</text>
<text x="58" y="696" font-size="11.5" fill="#6B7A8C">·  Autonomy range</text>

<!-- CLUSTER 4 — ORGANIZATIONAL DESIGN (bottom-right) -->
<rect x="490" y="560" width="290" height="160" fill="#F4F8FB" stroke="#E8F6FD" stroke-width="1"/>
<g transform="translate(510, 586)">
  <rect x="-4.5" y="-4.5" width="9" height="9" transform="rotate(45)" fill="#0E2A47"/>
</g>
<text x="526" y="590" font-size="13" letter-spacing="2.5" fill="#0E2A47" font-weight="700">ORGANIZATIONAL DESIGN</text>
<line x1="505" y1="606" x2="765" y2="606" stroke="#E8F6FD" stroke-width="1"/>
<text x="508" y="630" font-size="12.5" fill="#0E2A47" font-weight="600">Where does the work sit, who owns it, what does it owe?</text>
<text x="508" y="656" font-size="11.5" fill="#6B7A8C">·  Where data sits</text>
<text x="508" y="676" font-size="11.5" fill="#6B7A8C">·  Alignment &amp; assignments</text>
<text x="508" y="696" font-size="11.5" fill="#6B7A8C">·  Three decision surfaces</text>

<!-- FOOTER -->
<text x="48" y="780" font-size="11" letter-spacing="2.5" fill="#6B7A8C" font-weight="600">ANALYTIC BYTES</text>
<text x="772" y="780" text-anchor="end" font-size="11" fill="#6B7A8C" font-style="italic">From fragmented to decision-ready.</text>

</svg>
