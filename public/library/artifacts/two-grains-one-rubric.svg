<svg viewBox="0 0 820 770" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">Two Grains, One Rubric</title>
<desc>A tool-agnostic reference diagram. One outcome rubric of six dimensions — output vs outcome, comparison, durability, reach not equal to result, leading indicators, and attribution honesty — is the keystone. It forks into two readings that share the same six questions but ask them at a different unit of analysis. A funder reads its portfolio report at portfolio grain (did the field move?); a service provider reads its program report at case grain (did this case change?). The dimensions do not change between the two; only the grain does.</desc>
<rect width="820" height="770" fill="#FFFFFF"/>

<text x="80" y="56" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">TWO GRAINS · ONE RUBRIC</text>
<text x="80" y="92" font-size="22" fill="#0F2A4A" font-weight="700">One standard reads the report.</text>
<text x="80" y="120" font-size="22" fill="#0EA5E9" font-weight="700">Only the grain changes.</text>

<!-- Keystone header strip -->
<rect x="80" y="160" width="660" height="44" rx="8" fill="#E8F6FD" stroke="#0EA5E9" stroke-width="2.5"/>
<text x="104" y="188" font-size="16" fill="#0F2A4A" font-weight="700">The Outcome Rubric — six dimensions</text>
<rect x="632" y="170" width="92" height="24" rx="12" fill="#0EA5E9"/>
<text x="678" y="186" font-size="11" letter-spacing="1.2" fill="#FFFFFF" font-weight="600" text-anchor="middle">KEYSTONE</text>

<!-- Six-dimension panel -->
<rect x="80" y="214" width="660" height="216" rx="8" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>

<!-- left column -->
<circle cx="106" cy="258" r="4" fill="#0EA5E9"/>
<text x="120" y="263" font-size="15" fill="#0F2A4A" font-weight="600">1 · Output vs outcome</text>
<text x="120" y="281" font-size="12" fill="#6B7A8C">a headline of change, not delivery</text>
<circle cx="106" cy="318" r="4" fill="#0EA5E9"/>
<text x="120" y="323" font-size="15" fill="#0F2A4A" font-weight="600">2 · Comparison</text>
<text x="120" y="341" font-size="12" fill="#6B7A8C">a “vs.” — outcome split from impact</text>
<circle cx="106" cy="378" r="4" fill="#0EA5E9"/>
<text x="120" y="383" font-size="15" fill="#0F2A4A" font-weight="600">3 · Durability</text>
<text x="120" y="401" font-size="12" fill="#6B7A8C">sustained, not point-of-service</text>

<!-- right column -->
<circle cx="416" cy="258" r="4" fill="#0EA5E9"/>
<text x="430" y="263" font-size="15" fill="#0F2A4A" font-weight="600">4 · Reach ≠ result</text>
<text x="430" y="281" font-size="12" fill="#6B7A8C">deployment kept distinct from outcome</text>
<circle cx="416" cy="318" r="4" fill="#0EA5E9"/>
<text x="430" y="323" font-size="15" fill="#0F2A4A" font-weight="600">5 · Leading indicators</text>
<text x="430" y="341" font-size="12" fill="#6B7A8C">near-term signals that predict the goal</text>
<circle cx="416" cy="378" r="4" fill="#0EA5E9"/>
<text x="430" y="383" font-size="15" fill="#0F2A4A" font-weight="600">6 · Attribution honesty</text>
<text x="430" y="401" font-size="12" fill="#6B7A8C">“contributed to” vs “caused”</text>

<!-- Fork -->
<line x1="410" y1="430" x2="410" y2="452" stroke="#0F2A4A" stroke-width="2"/>
<circle cx="410" cy="452" r="4" fill="#0EA5E9"/>
<path d="M410,452 C410,470 250,470 250,486" fill="none" stroke="#0EA5E9" stroke-width="2"/>
<path d="M410,452 C410,470 570,470 570,486" fill="none" stroke="#0EA5E9" stroke-width="2"/>
<path d="M244,480 l6,8 l6,-8 z" fill="#0EA5E9"/>
<path d="M564,480 l6,8 l6,-8 z" fill="#0EA5E9"/>

<!-- Funder panel -->
<rect x="80" y="488" width="315" height="184" rx="8" fill="#F4F8FB" stroke="#0F2A4A" stroke-width="1.2"/>
<text x="104" y="520" font-size="12" letter-spacing="1.8" fill="#0EA5E9" font-weight="600">FUNDER</text>
<text x="104" y="546" font-size="17" fill="#0F2A4A" font-weight="700">Portfolio grain</text>
<text x="104" y="578" font-size="16" fill="#0EA5E9" font-weight="600">“Did the field move?”</text>
<line x1="104" y1="592" x2="371" y2="592" stroke="#D7E3EA" stroke-width="1"/>
<text x="104" y="616" font-size="11.5" fill="#3A4A5A">Output → dollars deployed vs. field change</text>
<text x="104" y="638" font-size="11.5" fill="#3A4A5A">Comparison → served vs. unserved (portfolio)</text>
<text x="104" y="660" font-size="11.5" fill="#3A4A5A">Attribution → the share the funding can claim</text>

<!-- Provider panel -->
<rect x="425" y="488" width="315" height="184" rx="8" fill="#F4F8FB" stroke="#0F2A4A" stroke-width="1.2"/>
<text x="449" y="520" font-size="12" letter-spacing="1.8" fill="#0EA5E9" font-weight="600">SERVICE PROVIDER</text>
<text x="449" y="546" font-size="17" fill="#0F2A4A" font-weight="700">Case grain</text>
<text x="449" y="578" font-size="16" fill="#0EA5E9" font-weight="600">“Did this case change?”</text>
<line x1="449" y1="592" x2="716" y2="592" stroke="#D7E3EA" stroke-width="1"/>
<text x="449" y="616" font-size="11.5" fill="#3A4A5A">Output → sessions delivered vs. life changed</text>
<text x="449" y="638" font-size="11.5" fill="#3A4A5A">Comparison → vs. a comparison at case level</text>
<text x="449" y="660" font-size="11.5" fill="#3A4A5A">Attribution → the share the program can claim</text>

<text x="80" y="724" font-size="13" letter-spacing="2" fill="#6B7A8C" font-weight="600">ANALYTIC BYTES</text>
<text x="232" y="724" font-size="13" fill="#0EA5E9">Same six questions. The grain tells you whose report you are reading.</text>
</svg>
