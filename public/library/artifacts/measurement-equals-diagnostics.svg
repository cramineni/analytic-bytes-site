<!-- Row 10 -->
<text x="540" y="1100" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">High-stakes assessment</text>
