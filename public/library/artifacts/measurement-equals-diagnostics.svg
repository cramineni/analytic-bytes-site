<text x="660" y="1150" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Treat / don&#8217;t treat decision</text>

<!-- Row 12 -->
<text x="540" y="1200" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">AERA / NCME / APA Standards</text>
<text x="540" y="1223" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">Standards for Educational &amp; Psychological Testing</text>
<circle cx="600" cy="1207" r="3" fill="#0EA5E9"/>
<text x="660" y="1200" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">FDA validation</text>
<text x="660" y="1223" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">510(k), PMA, CLIA</text>

<!-- Row 13 -->
<text x="540" y="1275" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Norming sample</text>
<text x="540" y="1298" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">comparison group for score interpretation</text>
<circle cx="600" cy="1282" r="3" fill="#0EA5E9"/>
<text x="660" y="1275" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Reference population</text>
<text x="660" y="1298" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">population for normal ranges</text>

<!-- Row 14 -->
<text x="540" y="1350" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Test security</text>
<circle cx="600" cy="1345" r="3" fill="#0EA5E9"/>
<text x="660" y="1350" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Specimen chain of custody</text>

<!-- Row 15 -->
<text x="540" y="1400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Whole-construct measurement</text>
<circle cx="600" cy="1395" r="3" fill="#0EA5E9"/>
<text x="660" y="1400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Whole-patient diagnosis</text>

<!-- Row 16 -->
<text x="540" y="1450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Validity argument</text>
<text x="540" y="1473" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">chain of evidence supporting the inference</text>
<circle cx="600" cy="1457" r="3" fill="#0EA5E9"/>
<text x="660" y="1450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Differential diagnosis</text>
<text x="660" y="1473" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">weighing competing explanations against evidence</text>

<!-- Closing prose -->
<text x="48" y="1600" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#0F2A4A">The vocabulary translates. <tspan fill="#0EA5E9">The discipline stays the same.</tspan></text>
<text x="48" y="1632" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#0F2A4A">Both fields learned the hard way: an instrument can agree with itself &#8212; and still be wrong about the world.</text>

<!-- AB tag -->
<text x="48" y="1700" font-family="Inter,Helvetica,Arial,sans-serif" font-size="19" letter-spacing="3" fill="#6B7A8C" font-weight="600">ANALYTIC BYTES</text>
<text x="270" y="1700" font-family="Inter,Helvetica,Arial,sans-serif" font-size="19" fill="#0EA5E9">From fragmented to decision-ready.</text>
