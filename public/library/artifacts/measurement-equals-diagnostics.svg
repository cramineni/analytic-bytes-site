<text x="540" y="748" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">probability of response by ability</text>
<circle cx="600" cy="732" r="3" fill="#0EA5E9"/>
