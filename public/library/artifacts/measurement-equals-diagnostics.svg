<svg viewBox="0 0 1200 1750" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Measurement = Diagnostics: Different instruments. Same discipline.</title>
<desc>Translation table on white showing how educational measurement vocabulary maps to medical diagnostics across sixteen paired concepts spanning foundations, models, bias and equity, stakes and decisions, standards and integrity, and integrative inference, with a two-line navy and teal headline above and an Analytic Bytes signature beneath.</desc>
<rect width="1200" height="1750" fill="#FFFFFF"/>

<!-- Top eyebrow -->
<text x="48" y="67" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3.7" fill="#0EA5E9">MEASUREMENT  =  DIAGNOSTICS</text>

<!-- Headline -->
<text x="48" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.3" fill="#0F2A4A">Different instruments.</text>
<text x="48" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.3" fill="#0EA5E9">Same discipline.</text>

<!-- Column headers -->
<text x="540" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="4" fill="#475569" text-anchor="end">MEASUREMENT</text>
<text x="660" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="4" fill="#475569" text-anchor="start">DIAGNOSTICS</text>

<!-- Row 1 -->
<text x="540" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Validity</text>
<text x="540" y="448" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">is the test measuring what it claims</text>
<circle cx="600" cy="432" r="3" fill="#0EA5E9"/>
<text x="660" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Validity</text>
<text x="660" y="448" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">is the test detecting what it claims</text>

<!-- Row 2 -->
<text x="540" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Reliability</text>
<text x="540" y="523" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">consistency across forms, raters, time</text>
<circle cx="600" cy="507" r="3" fill="#0EA5E9"/>
<text x="660" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Reliability</text>
<text x="660" y="523" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">consistency across instruments, operators, repeats</text>

<!-- Row 3 -->
<text x="540" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Construct validity</text>
<text x="540" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">score reflects the unobservable trait</text>
<circle cx="600" cy="582" r="3" fill="#0EA5E9"/>
<text x="660" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Biomarker validation</text>
<text x="660" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">marker reflects the underlying biology</text>

<!-- Row 4 -->
<text x="540" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Criterion validity</text>
<text x="540" y="673" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">predicts an external outcome</text>
<circle cx="600" cy="657" r="3" fill="#0EA5E9"/>
<text x="660" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Predictive value</text>
