<text x="660" y="1100" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">High-consequence diagnostic</text>

