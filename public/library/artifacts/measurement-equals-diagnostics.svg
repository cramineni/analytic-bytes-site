<!-- Row 6 -->
<text x="540" y="800" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Standard setting</text>
<text x="540" y="823" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">where &#8216;proficient&#8217; begins</text>
<circle cx="600" cy="807" r="3" fill="#0EA5E9"/>
<text x="660" y="800" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Diagnostic thresholds</text>
<text x="660" y="823" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">where &#8216;positive&#8217; begins</text>

<!-- Row 7 -->
<text x="540" y="875" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Equating</text>
<text x="540" y="898" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">comparable scores across test forms</text>
<circle cx="600" cy="882" r="3" fill="#0EA5E9"/>
<text x="660" y="875" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Calibration &amp; harmonization</text>
<text x="660" y="898" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">comparable readings across labs &amp; instruments</text>

<!-- Row 8 -->
<text x="540" y="950" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Differential Item Functioning</text>
<text x="540" y="973" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="end">item performs differently by subgroup</text>
<circle cx="600" cy="957" r="3" fill="#0EA5E9"/>
<text x="660" y="950" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="start">Disparate calibration</text>
<text x="660" y="973" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="start">algorithm performs differently by subgroup</text>

<!-- Row 9 -->
<text x="540" y="1025" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#0F2A4A" text-anchor="end">Universal Design for Assessment</text>
