<text x="208" y="668" font-size="13" letter-spacing="2" fill="#6B7A8C" font-weight="600">ANALYTIC BYTES</text>
<text x="360" y="668" font-size="13" fill="#0EA5E9">From fragmented to decision-ready.</text>
