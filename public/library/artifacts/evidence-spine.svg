<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">The Evidence Spine</title>
<desc id="desc">A MEL reference architecture. A living theory of change (the keystone) — one that adapts across populations and is refined by evidence over time — flows down through assessment portfolio, measurement scheme, and data quality and integrity, to credible evidence where one semantic layer makes program, funder and board reports agree. A cross-population equating rail, keeping the same theory of change comparable as it is modified for different populations, spans every layer. A learning loop returns evidence to refine the theory of change.</desc>
<rect width="820" height="720" fill="#FFFFFF"/>

<text x="208" y="50" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">THE EVIDENCE SPINE</text>
<text x="208" y="80" font-size="22" fill="#0F2A4A" font-weight="700">Anchor every measure to the theory of change.</text>
<text x="208" y="108" font-size="22" fill="#0EA5E9" font-weight="700">Then every report tells one story.</text>

<path d="M215,600 H104 Q90,600 90,586 V172 Q90,158 104,158 H203" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5 4"/>
<path d="M203,158 l-9,-4 l0,8 z" fill="#0EA5E9"/>
<text transform="translate(72,400) rotate(-90)" font-size="11.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="middle">LEARNING LOOP</text>
<text transform="translate(72,222) rotate(-90)" font-size="10.5" letter-spacing="0.4" fill="#6B7A8C" text-anchor="middle">evidence refines the theory over time</text>

<text x="200" y="198" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">ANCHOR</text>
<text x="200" y="290" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">COLLECT</text>
<text x="200" y="382" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">ALIGN</text>
<text x="200" y="474" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">VERIFY</text>
<text x="200" y="578" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">REPORT</text>

<rect x="700" y="158" width="60" height="456" rx="8" fill="#F4F8FB" stroke="#0F2A4A" stroke-width="1.2" stroke-dasharray="4 3"/>
<text transform="translate(730,386) rotate(-90)" font-size="11.5" letter-spacing="1.2" fill="#0F2A4A" font-weight="600" text-anchor="middle">CROSS-POPULATION EQUATING</text>

<rect x="215" y="158" width="468" height="70" rx="8" fill="#E8F6FD" stroke="#0EA5E9" stroke-width="2.5"/>
<text x="239" y="188" font-size="21" fill="#0F2A4A" font-weight="700">Theory of Change</text>
<text x="239" y="210" font-size="13.5" fill="#3A4A5A">A living pathway — adapts by population, refined by evidence</text>
<rect x="575" y="172" width="92" height="22" rx="11" fill="#0EA5E9"/>
<text x="621" y="187" font-size="11" letter-spacing="1.2" fill="#FFFFFF" font-weight="600" text-anchor="middle">KEYSTONE</text>

<rect x="215" y="250" width="468" height="70" rx="8" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="239" y="280" font-size="21" fill="#0F2A4A" font-weight="600">Assessment Portfolio</text>
<text x="239" y="302" font-size="13.5" fill="#6B7A8C">Survey · observer · administrative · qualitative</text>

<rect x="215" y="342" width="468" height="70" rx="8" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="239" y="372" font-size="21" fill="#0F2A4A" font-weight="600">Measurement Scheme</text>
<text x="239" y="394" font-size="13.5" fill="#6B7A8C">Cross-walks · shared core + modules · less burden</text>

<rect x="215" y="434" width="468" height="70" rx="8" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="239" y="464" font-size="21" fill="#0F2A4A" font-weight="600">Data Quality &amp; Integrity</text>
<text x="239" y="486" font-size="13.5" fill="#6B7A8C">Missingness · reliability · differential item functioning</text>

<rect x="215" y="534" width="468" height="80" rx="8" fill="#0EA5E9"/>
<text x="239" y="568" font-size="22" fill="#FFFFFF" font-weight="700">Credible Evidence</text>
<text x="239" y="592" font-size="13.5" fill="#E8F6FD">One semantic layer — program, funder &amp; board reports agree</text>

