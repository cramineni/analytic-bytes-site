<text transform="translate(730,386) rotate(-90)" font-size="11.5" letter-spacing="1.2" fill="#0E2A47" font-weight="600" text-anchor="middle">HUMAN-IN-THE-LOOP · AUTONOMY · GUARDRAILS</text>

