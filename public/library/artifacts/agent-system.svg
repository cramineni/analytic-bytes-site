<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">The Agent System</title>
<desc id="desc">The AB Agent Blueprint as a reference architecture. Five named agents — Data, Analysis, Insight, Execution, Monitoring — operate the Signal-to-Decision-to-Action loop. The Monitoring Agent closes the loop, feeding drift and impact signals back to the Data Agent so the system keeps learning. A human-in-the-loop rail with autonomy controls and guardrails spans every agent. The value transformation runs down the left: signal, decision, action, feedback.</desc>
<rect width="820" height="720" fill="#FFFFFF"/>

<text x="208" y="50" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">THE AGENT SYSTEM</text>
<text x="208" y="80" font-size="22" fill="#0E2A47" font-weight="700">Signal → Decision → Action,</text>
<text x="208" y="108" font-size="22" fill="#0EA5E9" font-weight="700">closed by monitoring.</text>

<path d="M215,600 H104 Q90,600 90,586 V172 Q90,158 104,158 H203" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5 4"/>
<path d="M203,158 l-9,-4 l0,8 z" fill="#0EA5E9"/>
<text transform="translate(72,400) rotate(-90)" font-size="11.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="middle">FEEDBACK LOOP</text>
<text transform="translate(72,224) rotate(-90)" font-size="10.5" letter-spacing="0.4" fill="#6B7A8C" text-anchor="middle">monitoring keeps the system learning</text>

<text x="200" y="244" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">SIGNAL</text>
<text x="200" y="382" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">DECISION</text>
<text x="200" y="474" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">ACTION</text>
<text x="200" y="578" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">FEEDBACK</text>

