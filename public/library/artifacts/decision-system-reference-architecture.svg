<text x="200" y="604" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">DECISION</text>
<text x="200" y="700" font-size="12.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="end">ACTION</text>

