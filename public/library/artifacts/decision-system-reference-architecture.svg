<svg viewBox="0 0 820 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Inter,Helvetica,Arial,sans-serif">
<title id="ttl">The Decision System</title>
<desc id="desc">A tool-agnostic reference architecture for a decision system. Raw data flows down through integration, warehouse, semantic layer, AI/ML/data science, and reporting surfaces to become decisions and actions. The semantic layer is the keystone. A governance, security, privacy and observability rail spans every layer including decisions. A learning loop returns outcomes as new signal, closing the system. The value transformation — data, information, insight, decision, action — runs down the left edge.</desc>
<rect width="820" height="820" fill="#FFFFFF"/>

<text x="208" y="50" font-size="15" letter-spacing="3" fill="#0EA5E9" font-weight="600">THE DECISION SYSTEM</text>
<text x="208" y="90" font-size="29" fill="#0F2A4A" font-weight="700">The tools change. <tspan fill="#0EA5E9">The architecture doesn't.</tspan></text>

<path d="M215,726 H104 Q90,726 90,712 V164 Q90,150 104,150 H203" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5 4"/>
