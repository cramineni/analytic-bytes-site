<text transform="translate(72,470) rotate(-90)" font-size="11.5" letter-spacing="1.5" fill="#0EA5E9" font-weight="600" text-anchor="middle">LEARNING LOOP</text>
<text transform="translate(72,300) rotate(-90)" font-size="10.5" letter-spacing="0.5" fill="#6B7A8C" text-anchor="middle">outcomes become new signal</text>

