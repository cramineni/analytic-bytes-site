  <rect x="490" y="663" width="42" height="26" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="542" y="681">Not typically required</text>
</g>

<!-- Signature -->
<text x="1140" y="681" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8" text-anchor="end">Analytic Bytes · 2026</text>

</svg>
