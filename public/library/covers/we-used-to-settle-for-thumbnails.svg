<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note No. 11: We used to settle for thumbnails.</title>
<desc>White background. On the left, a small navy square — the thumbnail — sits inside a modest border. On the right, an arrow points to a larger teal-framed rectangle — the full picture at higher resolution. The visual relationship names the shift: the compression institutions ran on for centuries is finally cheap to relax. Title and subtitle in sans-serif beneath, Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 11</text>

<!-- Thumbnail on left: small navy square -->
<g transform="translate(430, 220)">
  <rect x="0" y="0" width="60" height="60" fill="#0F2A4A" opacity="0.85"/>
  <text x="30" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" letter-spacing="2" fill="#94A3B8" text-anchor="middle">THUMBNAIL</text>
</g>

<!-- Arrow -->
<g transform="translate(520, 250)">
  <line x1="0" y1="0" x2="120" y2="0" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="112,-5 122,0 112,5" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Full picture on right: larger teal-outlined rectangle -->
<g transform="translate(650, 180)">
  <rect x="0" y="0" width="140" height="140" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>
  <!-- Interior grid lines suggest higher resolution -->
  <line x1="35" y1="0" x2="35" y2="140" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="70" y1="0" x2="70" y2="140" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="105" y1="0" x2="105" y2="140" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="35" x2="140" y2="35" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="70" x2="140" y2="70" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="105" x2="140" y2="105" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
  <text x="70" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" letter-spacing="2" fill="#475569" text-anchor="middle">THE FULL PICTURE</text>
</g>

<text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">We used to settle for thumbnails.</text>
<text x="600" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">The price of the full picture has collapsed.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
