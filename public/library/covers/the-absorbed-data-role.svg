<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note: The absorbed data role.</title>
<desc>White background with a navy line diagram. Four small navy-bordered delivery-role boxes, each containing a small teal disc that stands for absorbed data work, sit to the left. A larger dashed navy box labeled Data role sits to the right, empty. The visual names the pattern: data work scattered inside delivery roles, in the seat that stays unbuilt. Title and italic subtitle in sans-serif beneath. Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>

<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 11</text>

<g transform="translate(600, 250)">
  <!-- Four delivery-role boxes with absorbed teal dots -->
  <g>
    <rect x="-330" y="-25" width="55" height="50" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
    <circle cx="-302.5" cy="0" r="5" fill="#0EA5E9"/>
  </g>
  <g>
    <rect x="-255" y="-25" width="55" height="50" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
    <circle cx="-227.5" cy="0" r="5" fill="#0EA5E9"/>
  </g>
  <g>
    <rect x="-180" y="-25" width="55" height="50" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
    <circle cx="-152.5" cy="0" r="5" fill="#0EA5E9"/>
  </g>
  <g>
    <rect x="-105" y="-25" width="55" height="50" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
    <circle cx="-77.5" cy="0" r="5" fill="#0EA5E9"/>
  </g>
  <text x="-190" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#94A3B8">DELIVERY ROLES</text>

  <!-- Empty dedicated data role -->
  <rect x="80" y="-32" width="150" height="64" fill="none" stroke="#0F2A4A" stroke-width="1.5" stroke-dasharray="5 4" rx="3"/>
  <text x="155" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="1.5" fill="#0F2A4A">Data role</text>
  <text x="155" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#94A3B8">UNBUILT</text>
</g>

<text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">The absorbed data role.</text>
<text x="600" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">Where data work goes when no role owns it.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
