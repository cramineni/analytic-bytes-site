<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note: When the stakes are the mission.</title>
<desc>White background with a navy line diagram. A navy-bordered Frontier AI box on the left connects by a horizontal navy line to a teal disc at center labeled Evaluation. From that fulcrum the line forks. The upper fork continues as a solid navy line to a navy endpoint dot labeled Mission acceleration. The lower fork continues as a dashed slate line to a slate endpoint dot labeled Mission drift. The visual names what evaluation decides. Title and italic subtitle in sans-serif beneath. Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>

<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 10</text>

<g transform="translate(600, 250)">
  <!-- Frontier AI box on the left -->
  <rect x="-370" y="-25" width="140" height="50" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
  <text x="-300" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="1.5" fill="#0F2A4A">Frontier AI</text>

  <!-- Line into evaluation fulcrum -->
  <line x1="-230" y1="0" x2="-14" y2="0" stroke="#0F2A4A" stroke-width="1.5"/>
  <circle cx="0" cy="0" r="12" fill="#0EA5E9"/>
  <text x="0" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#475569">EVALUATION</text>

  <!-- Upper fork: Mission acceleration (solid navy) -->
  <line x1="10" y1="-4" x2="185" y2="-52" stroke="#0F2A4A" stroke-width="1.5"/>
  <circle cx="190" cy="-53" r="5" fill="#0F2A4A"/>
  <text x="205" y="-48" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="1" fill="#0F2A4A">Mission acceleration</text>

  <!-- Lower fork: Mission drift (dashed slate) -->
  <line x1="10" y1="4" x2="185" y2="52" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 3"/>
  <circle cx="190" cy="53" r="5" fill="#94A3B8"/>
  <text x="205" y="58" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="1" fill="#94A3B8">Mission drift</text>
</g>

<text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">When the stakes are the mission.</text>
<text x="600" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">The evaluation gap in mission-driven AI adoption.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
