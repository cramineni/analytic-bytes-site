<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Library Essay No. 04: Actions, Not Answers</title>
<desc>White background. Two horizontal flow lines in navy line work. The upper line, labelled "answers", runs between two endpoints and is interrupted at its midpoint by a solid navy ring — a human checkpoint the flow must pass through. The lower line, labelled "actions", runs straight through uninterrupted, with only a dashed teal open ring on a faint teal tint where the checkpoint would be — the checkpoint that no longer comes free. Title and subtitle in sans-serif beneath.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essays  ·  No. 04</text>
<g transform="translate(640, 224)">
<circle cx="0" cy="54" r="26" fill="#0EA5E9" opacity="0.1"/>
<line x1="-152" y1="-54" x2="-18" y2="-54" stroke="#0F2A4A" stroke-width="2.6" stroke-linecap="round"/>
<line x1="18" y1="-54" x2="152" y2="-54" stroke="#0F2A4A" stroke-width="2.6" stroke-linecap="round"/>
<circle cx="-160" cy="-54" r="5.5" fill="#0F2A4A"/>
<circle cx="160" cy="-54" r="5.5" fill="#0F2A4A"/>
<circle cx="0" cy="-54" r="15" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="3.2"/>
<line x1="-152" y1="54" x2="152" y2="54" stroke="#0F2A4A" stroke-width="2.6" stroke-linecap="round"/>
<circle cx="-160" cy="54" r="5.5" fill="#0F2A4A"/>
<circle cx="160" cy="54" r="5.5" fill="#0F2A4A"/>
<circle cx="0" cy="54" r="15" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="2 4"/>
<text x="-188" y="-50" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" letter-spacing="1.5" fill="#475569" text-anchor="end">ANSWERS</text>
<text x="-188" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" letter-spacing="1.5" fill="#475569" text-anchor="end">ACTIONS</text>
</g>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Actions, not answers.</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">Agentic AI, and the checkpoint that no longer comes free.</text>
