<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Public data as a decision system — Analytic Bytes</title>
<desc>White background. A row of five horizontal bar-chart abstractions at the top representing the five PDDS panels: overdose, NAEP, maternal, scorecard, SLDS. Each panel has a muted baseline bar and a navy current-year bar of different length. Below the panels, the title "Public data as a decision system." in navy. Italic subtitle "Once the data was published, did the number actually move?" in muted grey. Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>

<!-- Eyebrow -->
<text x="600" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Library  ·  Decision systems</text>

<!-- Five mini-panels representing the five PDDS panels.
     Each shows a muted-grey baseline bar + a navy current-year bar (or single navy for scorecard/SLDS). -->
<g transform="translate(240, 170)">
  <!-- Panel 1: overdose (multi) -->
  <g transform="translate(0, 0)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8">OVERDOSE</text>
    <rect x="0" y="0" width="130" height="6" fill="#B4C0CC"/>
    <rect x="0" y="10" width="98" height="6" fill="#0F2A4A"/>
  </g>
  <!-- Panel 2: NAEP (multi) -->
  <g transform="translate(0, 42)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8">NAEP</text>
    <rect x="0" y="0" width="112" height="6" fill="#B4C0CC"/>
    <rect x="0" y="10" width="115" height="6" fill="#0F2A4A"/>
  </g>
  <!-- Panel 3: maternal (multi) -->
  <g transform="translate(0, 84)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8">MATERNAL</text>
    <rect x="0" y="0" width="120" height="6" fill="#B4C0CC"/>
    <rect x="0" y="10" width="122" height="6" fill="#0F2A4A"/>
  </g>

  <!-- Panel 4: scorecard (single-period) -->
  <g transform="translate(400, 0)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8">SCORECARD</text>
    <rect x="0" y="0" width="140" height="6" fill="#0F2A4A"/>
    <rect x="0" y="9" width="106" height="6" fill="#0F2A4A"/>
    <rect x="0" y="18" width="86" height="6" fill="#0F2A4A"/>
  </g>
  <!-- Panel 5: SLDS (single-period) -->
  <g transform="translate(400, 60)">
    <text x="0" y="-8" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#94A3B8">SLDS</text>
    <rect x="0" y="0" width="130" height="6" fill="#0F2A4A"/>
    <rect x="0" y="9" width="112" height="6" fill="#0F2A4A"/>
    <rect x="0" y="18" width="94" height="6" fill="#0F2A4A"/>
  </g>
</g>

<!-- Title -->
<text x="600" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="600" letter-spacing="-0.02em" fill="#0F2A4A" text-anchor="middle">Public data as a decision system.</text>

<!-- Subtitle -->
<text x="600" y="452" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="19" font-style="italic" fill="#475569" text-anchor="middle">Once the data was published, did the number actually move?</text>

<!-- Signature divider + line -->
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
