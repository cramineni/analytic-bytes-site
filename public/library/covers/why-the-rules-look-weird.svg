<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note No. 10: Why the rules look weird.</title>
<desc>White background with a navy line-work diagram. Five small navy-outlined boxes in a row on the left, then a horizontal handoff between two boxes marked by a teal exchange zone — the baton exchange rule as a stand-in for the essay's structural theme. Two-line title beneath: a lighter gray "Most rules describe normal play." above a navy "Why the rules look weird." Italic subtitle "The interface is where the race is decided." Analytic Bytes signature at the bottom.</desc>

<rect width="1200" height="630" fill="#FFFFFF"/>

<!-- Eyebrow -->
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 10</text>

<!-- Diagram, centered at (600, 270) -->
<g transform="translate(600, 270)">

  <!-- Left: 5 small "normal rule" boxes in a row -->
  <rect x="-280" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="-240" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="-200" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="-160" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="-120" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <text x="-197" y="-30" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#0F2A4A" text-anchor="middle">NORMAL RULES</text>

  <!-- Middle: the interface / handoff -->
  <rect x="-30" y="-40" width="120" height="80" fill="#0EA5E9" opacity="0.15"/>
  <rect x="-30" y="-40" width="120" height="80" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="30" y="-56" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#0EA5E9" text-anchor="middle">THE WEIRD RULE</text>

  <!-- Two runners approaching the exchange zone (as circles) -->
  <circle cx="-8" cy="0" r="10" fill="#0F2A4A"/>
  <circle cx="68" cy="0" r="10" fill="#0F2A4A"/>
  <!-- A tiny teal baton passing between -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="#0EA5E9" stroke-width="3"/>

  <!-- Right: 3 more "normal rule" boxes -->
  <rect x="132" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="172" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <rect x="212" y="-14" width="34" height="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
  <text x="185" y="-30" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#0F2A4A" text-anchor="middle">NORMAL RULES</text>

</g>

<!-- Title line 1 -->
<text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" letter-spacing="-0.3" fill="#64748B" text-anchor="middle">Most rules describe normal play.</text>

<!-- Title line 2 -->
<text x="600" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="600" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Why the rules look weird.</text>

<!-- Subtitle -->
<text x="600" y="525" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-style="italic" fill="#475569" text-anchor="middle">The interface is where the race is decided.</text>

<!-- Bottom divider -->
<line x1="570" y1="560" x2="630" y2="560" stroke="#94A3B8" stroke-width="1"/>

<!-- AB signature -->
<text x="600" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>

</svg>
