<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note No. 06: Why the rules look weird</title>
<desc>White background with a horizontal navy line representing the playing field. In the middle, the line bends upward over a small teal node and returns to baseline — the visible interruption is the rule, doing the structural work on purpose. Small navy dots mark each end of the line. Title and italic subtitle in sans-serif beneath, Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">FIELD NOTE  ·  No. 06</text>
<g transform="translate(600, 250)">
<path d="M -310 0 L -90 0 L -30 -50 L 30 -50 L 90 0 L 310 0" fill="none" stroke="#0F2A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="-310" cy="0" r="5" fill="#0F2A4A"/>
<circle cx="310" cy="0" r="5" fill="#0F2A4A"/>
<circle cx="0" cy="-50" r="9" fill="#0EA5E9"/>
</g>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Why the rules look weird</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">What sports rules teach about preventing predictable failure.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
