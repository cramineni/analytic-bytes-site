<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note No. 02: Stitching the layers</title>
<desc>White background with three horizontal layer lines stacked at different heights in navy, with vertical stitching lines connecting them at regular intervals and small teal dots at the connection points. Title and subtitle in sans-serif beneath.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 02</text>
<g transform="translate(600, 220)">
<line x1="-260" y1="-50" x2="260" y2="-50" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="-260" y1="0" x2="260" y2="0" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="-260" y1="50" x2="260" y2="50" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="-200" y1="-58" x2="-200" y2="58" stroke="#0F2A4A" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="-100" y1="-58" x2="-100" y2="58" stroke="#0F2A4A" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="0" y1="-58" x2="0" y2="58" stroke="#0F2A4A" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="100" y1="-58" x2="100" y2="58" stroke="#0F2A4A" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="200" y1="-58" x2="200" y2="58" stroke="#0F2A4A" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="-200" cy="-50" r="4" fill="#0EA5E9"/>
<circle cx="-100" cy="-50" r="4" fill="#0EA5E9"/>
<circle cx="0" cy="-50" r="4" fill="#0EA5E9"/>
<circle cx="100" cy="-50" r="4" fill="#0EA5E9"/>
<circle cx="200" cy="-50" r="4" fill="#0EA5E9"/>
<circle cx="-200" cy="0" r="4" fill="#0EA5E9"/>
<circle cx="-100" cy="0" r="4" fill="#0EA5E9"/>
<circle cx="0" cy="0" r="4" fill="#0EA5E9"/>
<circle cx="100" cy="0" r="4" fill="#0EA5E9"/>
<circle cx="200" cy="0" r="4" fill="#0EA5E9"/>
<circle cx="-200" cy="50" r="4" fill="#0EA5E9"/>
<circle cx="-100" cy="50" r="4" fill="#0EA5E9"/>
<circle cx="0" cy="50" r="4" fill="#0EA5E9"/>
<circle cx="100" cy="50" r="4" fill="#0EA5E9"/>
<circle cx="200" cy="50" r="4" fill="#0EA5E9"/>
</g>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Stitching the layers.</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">National data, classroom assessments, local instruments — composed.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
