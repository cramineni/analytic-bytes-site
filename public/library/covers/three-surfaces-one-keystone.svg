<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Essay No. 01: Three surfaces, one keystone</title>
<desc>White background with a centered geometric construction in navy: three short horizontal markers at the top representing three surfaces, three diagonal lines converging downward to a small hexagonal keystone with a teal inner accent. Title and subtitle in sans-serif beneath, Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essay  ·  No. 01</text>
<g transform="translate(600, 230)">
<line x1="-180" y1="-50" x2="-110" y2="-50" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="-35" y1="-50" x2="35" y2="-50" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="110" y1="-50" x2="180" y2="-50" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="-145" y1="-50" x2="0" y2="80" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="0" y1="-50" x2="0" y2="80" stroke="#0F2A4A" stroke-width="1.5"/>
<line x1="145" y1="-50" x2="0" y2="80" stroke="#0F2A4A" stroke-width="1.5"/>
<polygon points="0,80 28,97 28,128 0,145 -28,128 -28,97" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
<polygon points="0,98 13,106 13,121 0,129 -13,121 -13,106" fill="#0EA5E9"/>
</g>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Three surfaces, one keystone.</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">Why BI tool selection is the last decision, not the first.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
