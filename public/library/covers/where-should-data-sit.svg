<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Library Essay No. 05: Where Should Data Sit?</title>
<desc>White background. A small org-chart diagram in navy line work: one node at the apex, a horizontal bus, and four reports hanging from it — three small navy function nodes and one larger teal node marked "data" on a faint teal tint, reporting directly to the apex alongside the functions. Beneath the leftmost function, a dashed teal open circle hangs as a ghost — data mis-housed under a single function. Title and subtitle in sans-serif beneath.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essays  ·  No. 05</text>
