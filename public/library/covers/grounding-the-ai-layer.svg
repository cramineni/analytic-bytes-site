<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Essay No. 02: Grounding the AI layer</title>
<desc>White background with a layered stack diagram in navy line work — three rectangles at the top (BI, AI, Reports) with arrows pointing down to a single emphasized layer below labeled as the semantic layer, with a teal fill accent. Title and subtitle in sans-serif beneath.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essay  ·  No. 02</text>
<g transform="translate(600, 160)">
<rect x="-200" y="0" width="110" height="40" fill="none" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="-145" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#0F2A4A" text-anchor="middle">BI</text>
<rect x="-55" y="0" width="110" height="40" fill="none" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="0" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#0F2A4A" text-anchor="middle">AI</text>
<rect x="90" y="0" width="110" height="40" fill="none" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="145" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#0F2A4A" text-anchor="middle">Reports</text>
<line x1="-145" y1="40" x2="-145" y2="100" stroke="#0F2A4A" stroke-width="1.2"/>
<polygon points="-145,100 -149,92 -141,92" fill="#0F2A4A"/>
<line x1="0" y1="40" x2="0" y2="100" stroke="#0F2A4A" stroke-width="1.2"/>
<polygon points="0,100 -4,92 4,92" fill="#0F2A4A"/>
<line x1="145" y1="40" x2="145" y2="100" stroke="#0F2A4A" stroke-width="1.2"/>
<polygon points="145,100 141,92 149,92" fill="#0F2A4A"/>
<rect x="-220" y="105" width="440" height="55" fill="#0EA5E9" opacity="0.12" stroke="#0F2A4A" stroke-width="1.5"/>
<text x="0" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" letter-spacing="1" fill="#0F2A4A" text-anchor="middle">Semantic layer</text>
</g>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Grounding the AI layer.</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">Where AI belongs in the modern data stack, and what keeps it honest.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
