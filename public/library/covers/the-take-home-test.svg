<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Library Essay No. 03: The Take-Home Test</title>
<desc>White background. A small stack of document cards in navy line work — a take-home brief — its upper rows drawn as solid bulleted lines (the questions the brief asks for) and, below a faint divider, one row drawn as a dashed teal line on a faint teal tint, marked "the decision" — the question the brief never names. Title and subtitle in sans-serif beneath.</desc>
