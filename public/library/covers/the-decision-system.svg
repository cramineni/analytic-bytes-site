<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Essay No. 08: The Decision System.</title>
<desc>White background. Three navy-outlined circles labeled MEANING, AUTHORITY, VALIDITY sit at the vertices of an equilateral triangle, connected by teal lines — the three faucet-layer failures holding one another up. A small teal circle at the center marks the decision. Two-line title beneath: a lighter gray "The flag is the easy part." above a navy "The system is the work." Italic subtitle "Meaning. Authority. Validity." Analytic Bytes signature at the bottom.</desc>

<rect width="1200" height="630" fill="#FFFFFF"/>

<!-- Eyebrow -->
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essay  ·  No. 08</text>

<!-- Diagram: triangle of three concepts, centered at (600, 275) -->
<g transform="translate(600, 275)">

  <!-- Triangle connecting lines (teal) -->
  <line x1="0" y1="-100" x2="-105" y2="75" stroke="#0EA5E9" stroke-width="1.8"/>
  <line x1="0" y1="-100" x2="105" y2="75" stroke="#0EA5E9" stroke-width="1.8"/>
  <line x1="-105" y1="75" x2="105" y2="75" stroke="#0EA5E9" stroke-width="1.8"/>

  <!-- Center "decision" dot -->
  <circle cx="0" cy="5" r="10" fill="#0EA5E9"/>
  <text x="0" y="37" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#0F2A4A" text-anchor="middle">DECISION</text>

  <!-- Top vertex: MEANING (circle r=42, was 34) -->
  <circle cx="0" cy="-100" r="42" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.8"/>
  <text x="0" y="-96" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#0F2A4A" text-anchor="middle">MEANING</text>

  <!-- Bottom-left vertex: AUTHORITY (larger circle r=48 for the longer word) -->
  <circle cx="-105" cy="75" r="48" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.8"/>
  <text x="-105" y="79" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#0F2A4A" text-anchor="middle">AUTHORITY</text>

  <!-- Bottom-right vertex: VALIDITY -->
  <circle cx="105" cy="75" r="42" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.8"/>
  <text x="105" y="79" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#0F2A4A" text-anchor="middle">VALIDITY</text>

</g>

<!-- Title line 1 -->
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" letter-spacing="-0.3" fill="#64748B" text-anchor="middle">The flag is the easy part.</text>

<!-- Title line 2 -->
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="600" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">The system is the work.</text>

<!-- Subtitle -->
<text x="600" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-style="italic" fill="#475569" text-anchor="middle">Meaning. Authority. Validity.</text>

<!-- Bottom divider -->
<line x1="570" y1="565" x2="630" y2="565" stroke="#94A3B8" stroke-width="1"/>

<!-- AB signature -->
<text x="600" y="595" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>

</svg>
