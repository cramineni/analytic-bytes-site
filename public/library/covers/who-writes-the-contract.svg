<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Essay No. 11: Who writes the contract</title>
<desc>A circle divided vertically into two halves. The left half is filled solid navy, labeled Engineering — the half the hiring rubric assesses. The right half is a dashed teal outline, empty, labeled Governance and SME — the half the rubric can't see but the role needs. Above the circle, a small slate label reads One Role. Title and italic subtitle beneath. Analytic Bytes signature at the bottom.</desc>
<rect width="1200" height="630" fill="#FFFFFF"/>
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Essay  ·  No. 11</text>
<text x="600" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#94A3B8" text-anchor="middle">ONE ROLE</text>
<g transform="translate(600, 240)">
<path d="M 0 -75 A 75 75 0 0 0 0 75 Z" fill="#0F2A4A"/>
<path d="M 0 -75 A 75 75 0 0 1 0 75" fill="none" stroke="#0EA5E9" stroke-width="1.75" stroke-dasharray="6 4"/>
<line x1="0" y1="-75" x2="0" y2="75" stroke="#94A3B8" stroke-width="0.6"/>
</g>
<text x="555" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="2.5" fill="#0F2A4A" text-anchor="end">ENGINEERING</text>
<text x="645" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="2.5" fill="#0EA5E9" text-anchor="start">GOVERNANCE  +  SME</text>
<text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">Who writes the contract</text>
<text x="600" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-style="italic" fill="#475569" text-anchor="middle">Why the role the institution needs is the one the hiring rubric can't see.</text>
<line x1="570" y1="555" x2="630" y2="555" stroke="#94A3B8" stroke-width="1"/>
<text x="600" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>
</svg>
