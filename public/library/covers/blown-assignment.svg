<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Note No. 06: It's not a communication issue. It's a blown assignment.</title>
<desc>White background. Three horizontal boxes in a row showing the cross-functional play phases. Left box, solid navy fill with white text: PHASE ONE / ALIGNMENT / Where you fit. Center box, white interior with a dashed teal outline, an oversized teal question mark inside, labeled PHASE TWO / ASSIGNMENT. The middle box is the visually missing piece. Right box, solid navy fill with white text: PHASE THREE / EXECUTE / Run the play. Navy arrows connect the three boxes left to right. Two-line title beneath: lighter gray "It's not a communication issue." above a navy "It's a blown assignment." Italic subtitle "Alignment. Assignment. Execute." Analytic Bytes signature at the bottom.</desc>

<rect width="1200" height="630" fill="#FFFFFF"/>

<!-- Eyebrow -->
<text x="600" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">Field note  ·  No. 06</text>

<!-- Structural diagram, centered at (600, 270) -->
<g transform="translate(600, 270)">

  <!-- Box 1: ALIGNMENT (left, solid navy) -->
  <rect x="-330" y="-60" width="180" height="120" fill="#0F2A4A"/>
  <text x="-240" y="-22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#0EA5E9" text-anchor="middle">PHASE ONE</text>
  <text x="-240" y="10" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.5" fill="#FFFFFF" text-anchor="middle">ALIGNMENT</text>
  <text x="-240" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="middle">Where you fit.</text>

  <!-- Arrow 1 -->
  <line x1="-145" y1="0" x2="-100" y2="0" stroke="#0F2A4A" stroke-width="2"/>
  <polygon points="-95,0 -105,-5 -105,5" fill="#0F2A4A"/>

  <!-- Box 2: ASSIGNMENT (center, dashed teal outline, empty interior with ?) -->
  <rect x="-90" y="-60" width="180" height="120" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="0" y="-22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#0EA5E9" text-anchor="middle">PHASE TWO</text>
  <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#0EA5E9" text-anchor="middle">?</text>
  <text x="0" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.5" fill="#0F2A4A" text-anchor="middle">ASSIGNMENT</text>

  <!-- Arrow 2 -->
  <line x1="100" y1="0" x2="145" y2="0" stroke="#0F2A4A" stroke-width="2"/>
  <polygon points="150,0 140,-5 140,5" fill="#0F2A4A"/>

  <!-- Box 3: EXECUTE (right, solid navy) -->
  <rect x="150" y="-60" width="180" height="120" fill="#0F2A4A"/>
  <text x="240" y="-22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#0EA5E9" text-anchor="middle">PHASE THREE</text>
  <text x="240" y="10" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.5" fill="#FFFFFF" text-anchor="middle">EXECUTE</text>
  <text x="240" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#94A3B8" text-anchor="middle">Run the play.</text>

</g>

<!-- Title line 1 -->
<text x="600" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" letter-spacing="-0.3" fill="#64748B" text-anchor="middle">It&#8217;s not a communication issue.</text>

<!-- Title line 2 -->
<text x="600" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="600" letter-spacing="-0.5" fill="#0F2A4A" text-anchor="middle">It&#8217;s a blown assignment.</text>

<!-- Subtitle -->
<text x="600" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-style="italic" fill="#475569" text-anchor="middle">Alignment. Assignment. Execute.</text>

<!-- Bottom divider -->
<line x1="570" y1="565" x2="630" y2="565" stroke="#94A3B8" stroke-width="1"/>

<!-- AB signature -->
<text x="600" y="595" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#94A3B8" text-anchor="middle">Analytic Bytes  ·  2026</text>

</svg>
