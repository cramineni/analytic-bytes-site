<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LO 2.0 — the layers exist, the stitching does not</title>
<desc>Four vertically stacked layer boxes labeled National, District, School, Classroom, each with a short essence line and cadence. Between each pair of layers is a teal stitching contract labeled with what has to move between them. On the right, a vertical bracket labeled Integration architecture — the thing LO 2.0 proposes — encloses the four layers and their contracts.</desc>
<rect width="1200" height="620" fill="#FFFFFF"/>

<text x="600" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">LO 2.0 — STITCHING THE LAYERS</text>
<text x="600" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.4" fill="#0F2A4A" text-anchor="middle">Four layers of education data. The stitching is what LO 2.0 proposes.</text>
<text x="600" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-style="italic" fill="#475569" text-anchor="middle">Each layer measures something different, on its own cadence. The integration architecture is the seam.</text>

<!-- NATIONAL layer -->
<rect x="240" y="190" width="600" height="60" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
<text x="260" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#0F2A4A" text-anchor="start">National</text>
<text x="820" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#475569" text-anchor="end">UDISE+ · NAS · SEQI · policy cadence</text>
<text x="260" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start">Census-style coverage. Macro-policy signal.</text>

<!-- Stitching contract 1: national ↔ district -->
<line x1="540" y1="253" x2="540" y2="278" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="555" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#0EA5E9" text-anchor="start" font-style="italic">stitching contract</text>

<!-- DISTRICT layer -->
<rect x="240" y="280" width="600" height="60" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
<text x="260" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#0F2A4A" text-anchor="start">District</text>
<text x="820" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#475569" text-anchor="end">rollups · funding · aggregate reporting</text>
<text x="260" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start">District operations layer. Officer-level signal.</text>

<!-- Stitching contract 2 -->
<line x1="540" y1="343" x2="540" y2="368" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="555" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#0EA5E9" text-anchor="start" font-style="italic">stitching contract</text>

<!-- SCHOOL layer -->
<rect x="240" y="370" width="600" height="60" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
<text x="260" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#0F2A4A" text-anchor="start">School</text>
<text x="820" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#475569" text-anchor="end">headmaster · attendance · school-level dashboards</text>
<text x="260" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start">Building operations. Headmaster signal.</text>

<!-- Stitching contract 3 -->
<line x1="540" y1="433" x2="540" y2="458" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="555" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#0EA5E9" text-anchor="start" font-style="italic">stitching contract</text>

<!-- CLASSROOM layer -->
<rect x="240" y="460" width="600" height="60" fill="none" stroke="#0F2A4A" stroke-width="1.5" rx="3"/>
<text x="260" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#0F2A4A" text-anchor="start">Classroom</text>
<text x="820" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#475569" text-anchor="end">teacher · student mastery · real-time instruction</text>
<text x="260" y="505" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start">Instruction layer. Teacher-actionable signal.</text>

<!-- Right-side integration architecture bracket -->
<g>
  <line x1="880" y1="190" x2="880" y2="520" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="880" y1="190" x2="865" y2="190" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="880" y1="520" x2="865" y2="520" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="900" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#0EA5E9" text-anchor="start">INTEGRATION</text>
  <text x="900" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#0EA5E9" text-anchor="start">ARCHITECTURE</text>
</g>

<!-- Caption -->
<text x="600" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-style="italic" fill="#475569" text-anchor="middle">The layers exist. The stitching contracts between them are what LO 2.0 proposes and what most systems have not yet built.</text>
</svg>
