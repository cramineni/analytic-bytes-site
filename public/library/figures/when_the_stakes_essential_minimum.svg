<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>The essential minimum: five components of mission-driven AI evaluation</title>
<desc>Horizontal 5-part visual showing the essential-minimum evaluation discipline for mission-driven AI. Five numbered items across the width: task decomposition, ground-truth benchmarking, deployment-context evaluation, downstream impact evaluation, escalation and handoff. Each item has a navy numbered circle, a two-line label, and a one-line essence. A teal connecting line underneath binds them as one discipline. Signature at bottom.</desc>
<rect width="1200" height="600" fill="#FFFFFF"/>

<!-- Top eyebrow -->
<text x="600" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#0EA5E9" text-anchor="middle">THE ESSENTIAL MINIMUM</text>

<!-- Title -->
<text x="600" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="-0.4" fill="#0F2A4A" text-anchor="middle">Five items. None requires enterprise infrastructure.</text>

<!-- Subtitle -->
<text x="600" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-style="italic" fill="#475569" text-anchor="middle">What mission-driven AI evaluation asks — before scale, before budget.</text>

<!-- ITEM 1 — Task decomposition -->
<g transform="translate(168, 0)">
  <circle cx="0" cy="240" r="30" fill="#0F2A4A"/>
  <text x="0" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="0" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">Task</text>
  <text x="0" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">decomposition</text>
  <text x="0" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Name what the AI actually does —</text>
  <text x="0" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">not the vendor pitch.</text>
</g>

<!-- ITEM 2 — Ground-truth benchmarking -->
<g transform="translate(384, 0)">
  <circle cx="0" cy="240" r="30" fill="#0F2A4A"/>
  <text x="0" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="0" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">Ground-truth</text>
  <text x="0" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">benchmarking</text>
  <text x="0" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">20–50 hand-labeled cases from</text>
  <text x="0" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">your deployment context.</text>
</g>

<!-- ITEM 3 — Deployment-context evaluation -->
<g transform="translate(600, 0)">
  <circle cx="0" cy="240" r="30" fill="#0F2A4A"/>
  <text x="0" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="0" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">Deployment-context</text>
  <text x="0" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">evaluation</text>
  <text x="0" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Evaluate in context,</text>
  <text x="0" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">not a proxy environment.</text>
</g>

<!-- ITEM 4 — Downstream impact evaluation -->
<g transform="translate(816, 0)">
  <circle cx="0" cy="240" r="30" fill="#0F2A4A"/>
  <text x="0" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="0" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">Downstream</text>
  <text x="0" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">impact</text>
  <text x="0" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Track outcome shifts, not activity.</text>
  <text x="0" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Anchor internally and externally.</text>
</g>

<!-- ITEM 5 — Escalation and handoff -->
<g transform="translate(1032, 0)">
  <circle cx="0" cy="240" r="30" fill="#0F2A4A"/>
  <text x="0" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="0" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">Escalation</text>
  <text x="0" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0F2A4A" text-anchor="middle">and handoff</text>
  <text x="0" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Threshold map: alone, handoff,</text>
  <text x="0" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">or human-originated.</text>
</g>

<!-- Connecting line binding the five as one discipline -->
<g>
  <line x1="168" y1="450" x2="1032" y2="450" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="168" y1="450" x2="168" y2="465" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="1032" y1="450" x2="1032" y2="465" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="600" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2.5" fill="#0EA5E9" text-anchor="middle">FIVE COMPONENTS OF ONE DISCIPLINE</text>
</g>

</svg>
