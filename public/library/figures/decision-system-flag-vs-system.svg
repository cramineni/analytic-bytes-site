<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
<title>The flag is the easy part. The system is the work.</title>
<desc>Left panel shows a dashboard-style grid of colored flag dots (red, yellow, green) representing early-warning flags firing on a screen — but nothing happens. An arrow crosses to the right panel, which shows a triangle of three navy-outlined circles labeled MEANING, AUTHORITY, VALIDITY with a teal decision dot at the center — the decision system that turns flags into action.</desc>

<rect width="900" height="340" fill="#FFFFFF"/>

<!-- LEFT PANEL: The flag wall (dashboard-style) -->
<g transform="translate(60, 30)">
  <text x="150" y="0" font-size="11" font-weight="700" letter-spacing="2" fill="#6B7A8C" text-anchor="middle">THE FLAG WALL</text>

  <!-- Dashboard rectangle -->
  <rect x="0" y="18" width="300" height="230" fill="none" stroke="#CBD6E0" stroke-width="1.2" rx="4"/>

  <!-- 6 rows × 4 cols of flag dots (24 flags) — mix of red, yellow, green -->
  <!-- Row 1 -->
  <circle cx="45" cy="55" r="8" fill="#DC2626"/>
  <circle cx="115" cy="55" r="8" fill="#F59E0B"/>
  <circle cx="185" cy="55" r="8" fill="#10B981"/>
  <circle cx="255" cy="55" r="8" fill="#DC2626"/>
  <!-- Row 2 -->
  <circle cx="45" cy="90" r="8" fill="#F59E0B"/>
  <circle cx="115" cy="90" r="8" fill="#DC2626"/>
  <circle cx="185" cy="90" r="8" fill="#F59E0B"/>
  <circle cx="255" cy="90" r="8" fill="#10B981"/>
  <!-- Row 3 -->
  <circle cx="45" cy="125" r="8" fill="#10B981"/>
  <circle cx="115" cy="125" r="8" fill="#F59E0B"/>
  <circle cx="185" cy="125" r="8" fill="#DC2626"/>
  <circle cx="255" cy="125" r="8" fill="#F59E0B"/>
  <!-- Row 4 -->
  <circle cx="45" cy="160" r="8" fill="#DC2626"/>
  <circle cx="115" cy="160" r="8" fill="#10B981"/>
  <circle cx="185" cy="160" r="8" fill="#F59E0B"/>
  <circle cx="255" cy="160" r="8" fill="#DC2626"/>
  <!-- Row 5 -->
  <circle cx="45" cy="195" r="8" fill="#F59E0B"/>
  <circle cx="115" cy="195" r="8" fill="#DC2626"/>
  <circle cx="185" cy="195" r="8" fill="#10B981"/>
  <circle cx="255" cy="195" r="8" fill="#F59E0B"/>
  <!-- Row 6 -->
  <circle cx="45" cy="230" r="8" fill="#10B981"/>
  <circle cx="115" cy="230" r="8" fill="#F59E0B"/>
  <circle cx="185" cy="230" r="8" fill="#DC2626"/>
  <circle cx="255" cy="230" r="8" fill="#10B981"/>

  <!-- Caption below -->
  <text x="150" y="278" font-size="13" fill="#0F2A4A" text-anchor="middle" font-weight="600">Nothing happens.</text>
  <text x="150" y="298" font-size="11.5" fill="#6B7A8C" text-anchor="middle" font-style="italic">The flag was the easy part.</text>
</g>

<!-- MIDDLE: horizontal arrow -->
<g transform="translate(400, 155)">
  <line x1="0" y1="0" x2="80" y2="0" stroke="#0F2A4A" stroke-width="1.75"/>
  <path d="M76,-5 L86,0 L76,5 z" fill="#0F2A4A"/>
  <text x="43" y="-18" font-size="10" font-weight="700" letter-spacing="2" fill="#0EA5E9" text-anchor="middle">SYSTEM</text>
</g>

<!-- RIGHT PANEL: The decision system triangle -->
<g transform="translate(680, 30)">
  <text x="80" y="0" font-size="11" font-weight="700" letter-spacing="2" fill="#6B7A8C" text-anchor="middle">THE DECISION SYSTEM</text>

  <!-- Triangle at center of right panel -->
  <g transform="translate(80, 130)">
    <!-- Triangle lines -->
    <line x1="0" y1="-70" x2="-75" y2="55" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="0" y1="-70" x2="75" y2="55" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="-75" y1="55" x2="75" y2="55" stroke="#0EA5E9" stroke-width="1.5"/>

    <!-- Center decision dot -->
    <circle cx="0" cy="3" r="8" fill="#0EA5E9"/>
    <text x="0" y="28" font-size="8.5" font-weight="700" letter-spacing="1.5" fill="#0F2A4A" text-anchor="middle">DECISION</text>

    <!-- Vertices -->
    <circle cx="0" cy="-70" r="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
    <text x="0" y="-67" font-size="8.5" font-weight="700" letter-spacing="1" fill="#0F2A4A" text-anchor="middle">MEANING</text>

    <circle cx="-75" cy="55" r="32" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
    <text x="-75" y="58" font-size="8" font-weight="700" letter-spacing="0.8" fill="#0F2A4A" text-anchor="middle">AUTHORITY</text>

    <circle cx="75" cy="55" r="28" fill="#FFFFFF" stroke="#0F2A4A" stroke-width="1.5"/>
    <text x="75" y="58" font-size="8.5" font-weight="700" letter-spacing="1" fill="#0F2A4A" text-anchor="middle">VALIDITY</text>
  </g>

  <!-- Caption below -->
  <text x="80" y="278" font-size="13" fill="#0F2A4A" text-anchor="middle" font-weight="600">A decision happens.</text>
  <text x="80" y="298" font-size="11.5" fill="#6B7A8C" text-anchor="middle" font-style="italic">The system is the work.</text>
</g>

</svg>
